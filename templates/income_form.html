{% extends "base.html" %}
{% block title %}Nuevo Ingreso{% endblock %}
{% block content %}
<h2>Registrar Ingreso</h2>
<div class="card" style="max-width: 500px;">
    <form method="post">
        <div class="form-group">
            <label>Descripción *</label>
            <input type="text" name="description" required>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Monto *</label>
                <input type="number" step="0.01" name="amount" required>
            </div>
            <div class="form-group">
                <label>Fecha</label>
                <input type="date" name="income_date" value="{{ 'now' }}">
            </div>
        </div>
        <div class="form-group">
            <label>Categoría</label>
            <select name="category">
                <option value="router">Router</option>
                <option value="mini_up">Mini UPS</option>
                <option value="cable">Cable/Accesorios</option>
                <option value="instalacion">Instalación</option>
                <option value="otro">Otro</option>
            </select>
        </div>
        <div class="form-group">
            <label>Notas</label>
            <textarea name="notes" rows="2"></textarea>
        </div>
        <button type="submit" class="btn btn-success">Registrar Ingreso</button>
        <a href="{{ url_for('finances') }}" class="btn" style="background: #64748b;">Cancelar</a>
    </form>
</div>
{% endblock %}
