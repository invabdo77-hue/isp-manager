{% extends "base.html" %}
{% block title %}Planes - ISP Manager{% endblock %}
{% block content %}
<div class="header">
    <h2>Planes</h2>
    <div style="display: flex; gap: 10px;">
        <a href="{{ url_for('export_plans') }}" class="btn btn-success">📥 Exportar Excel</a>
        <a href="{{ url_for('plan_new') }}" class="btn">+ Nuevo Plan</a>
    </div>
</div>
<div class="stats">
    {% for p in plans %}
    <div class="stat-card">
        <div class="value" style="font-size: 1.4rem;">{{ p.name }}</div>
        <div class="label">{{ p.speed }} - ${{ "%.2f"|format(p.price) }}</div>
        <div class="label">{{ p.client_count }} clientes</div>
        <div class="actions" style="margin-top: 12px;">
            <a href="{{ url_for('plan_edit', id=p.id) }}" class="btn btn-sm btn-warning">Editar</a>
            <form method="post" action="{{ url_for('plan_delete', id=p.id) }}" style="display:inline;" onsubmit="return confirm('¿Eliminar este plan?');">
                <button type="submit" class="btn btn-sm btn-danger">Eliminar</button>
            </form>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
