{% extends "base.html" %}
{% block title %}{{ 'Editar' if plan else 'Nuevo' }} Plan{% endblock %}
{% block content %}
<h2>{{ 'Editar' if plan else 'Nuevo' }} Plan</h2>
<div class="card" style="max-width: 500px;">
    <form method="post">
        <div class="form-group">
            <label>Nombre *</label>
            <input type="text" name="name" value="{{ plan.name if plan else '' }}" required>
        </div>
        <div class="form-group">
            <label>Velocidad *</label>
            <input type="text" name="speed" value="{{ plan.speed if plan else '' }}" placeholder="Ej: 50 Mbps" required>
        </div>
        <div class="form-group">
            <label>Precio *</label>
            <input type="number" step="0.01" name="price" value="{{ plan.price if plan else '' }}" required>
        </div>
        <div class="form-group">
            <label>Descripción</label>
            <textarea name="description" rows="3">{{ plan.description if plan else '' }}</textarea>
        </div>
        <button type="submit" class="btn">{{ 'Actualizar' if plan else 'Crear' }} Plan</button>
        <a href="{{ url_for('plans_list') }}" class="btn" style="background: #64748b;">Cancelar</a>
    </form>
</div>
{% endblock %}
