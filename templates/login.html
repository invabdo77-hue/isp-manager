{% extends "base.html" %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: calc(100vh - 60px); padding: 20px;">
    <div class="card" style="width: 100%; max-width: 400px;">
        <h3 style="margin-bottom: 20px; text-align: center;">Iniciar Sesión</h3>
        <form method="POST">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn" style="width: 100%; justify-content: center; margin-top: 10px;">Entrar</button>
        </form>
    </div>
</div>
{% endblock %}
